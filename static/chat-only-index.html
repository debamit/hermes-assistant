<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hermes Assistant</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0d1117;
      color: #e6edf3;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 14px 20px;
      border-bottom: 1px solid #21262d;
      display: flex;
      align-items: center;
      gap: 10px;
      flex-shrink: 0;
    }

    header h1 {
      font-size: 16px;
      font-weight: 600;
      color: #e6edf3;
    }

    header span {
      font-size: 12px;
      color: #7d8590;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 2px 8px;
    }

    #chat {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .message {
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
      line-height: 1.6;
      font-size: 15px;
      white-space: pre-wrap;
      word-break: break-word;
    }

    .message.user {
      text-align: right;
      color: #79c0ff;
    }

    .message.assistant {
      color: #e6edf3;
    }

    .message .label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 4px;
      color: #7d8590;
    }

    .message.user .label { text-align: right; }

    .thinking {
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      padding: 10px 14px;
      margin-bottom: 10px;
      font-size: 13px;
      color: #8b949e;
    }

    .thinking summary {
      cursor: pointer;
      font-weight: 600;
      color: #7d8590;
      user-select: none;
      list-style: none;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .thinking summary::before {
      content: '▶';
      font-size: 10px;
      transition: transform 0.15s;
      display: inline-block;
    }

    .thinking[open] summary::before {
      transform: rotate(90deg);
    }

    .thinking pre {
      margin-top: 8px;
      white-space: pre-wrap;
      word-break: break-word;
      color: #adbac7;
      font-family: inherit;
      font-size: inherit;
    }

    .message .response-text {
      display: block;
    }

    #input-area {
      border-top: 1px solid #21262d;
      padding: 14px 20px;
      display: flex;
      gap: 10px;
      flex-shrink: 0;
      max-width: 720px;
      width: 100%;
      margin: 0 auto;
    }

    #input-area input {
      flex: 1;
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 8px;
      color: #e6edf3;
      padding: 10px 14px;
      font-size: 15px;
      font-family: inherit;
      outline: none;
      transition: border-color 0.15s;
    }

    #input-area input:focus { border-color: #388bfd; }
    #input-area input:disabled { opacity: 0.5; cursor: not-allowed; }

    #input-area button {
      background: #238636;
      color: #fff;
      border: none;
      border-radius: 8px;
      padding: 10px 18px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.15s;
    }

    #input-area button:hover:not(:disabled) { background: #2ea043; }
    #input-area button:disabled { opacity: 0.5; cursor: not-allowed; }
  </style>
</head>
<body>

  <header>
    <h1>Hermes Assistant</h1>
    <span id="model-label">—</span>
  </header>

  <div id="price-root"></div>

  <div id="chat"></div>

  <div id="input-area">
    <input id="msg" type="text" placeholder="Ask anything…" autocomplete="off" autofocus />
    <button id="send">Send</button>
  </div>

  <script>
    const chat      = document.getElementById('chat');
    const input     = document.getElementById('msg');
    const sendBtn   = document.getElementById('send');
    const modelLabel = document.getElementById('model-label');

    // --- Model label ---
    fetch('/info')
      .then(r => r.json())
      .then(d => { modelLabel.textContent = d.model || '—'; })
      .catch(() => {});

    // --- Price component (loaded separately) ---
    fetch('/prices.html')
      .then(r => r.text())
      .then(html => {
        document.getElementById('price-root').innerHTML = html;
        // Initialize prices after injecting HTML
        initPrices();
      })
      .catch(() => {});

    function initPrices() {
      function formatUSD(v) {
        if (v === undefined || v === null) return '—';
        return '$' + Number(v).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
      }
      function formatETH(v) {
        if (v === undefined || v === null || v === 0) return '—';
        return Number(v).toFixed(6) + ' ETH';
      }
      function renderPrices(data) {
        if (data.error) return;
        const assets = ['btc', 'gold', 'silver'];
        assets.forEach(id => {
          const block = document.getElementById('price-' + id);
          if (!block || !data[id]) return;
          block.querySelector('.usd').textContent = formatUSD(data[id].usd);
          block.querySelector('.eth').textContent = formatETH(data[id].eth);
        });
      }
      async function fetchPrices() {
        try {
          const r = await fetch('/prices');
          if (!r.ok) return;
          const data = await r.json();
          renderPrices(data);
        } catch (_) {}
      }
      fetchPrices();
      setInterval(fetchPrices, 5 * 60 * 1000);
    }

    let controller = null;

    // --- Helpers ---
    function escapeHtml(text) {
      return text
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    function setInput(enabled) {
      input.disabled = !enabled;
      sendBtn.disabled = !enabled;
    }

    // --- Message construction ---
    function appendMessage(role, text) {
      const div = document.createElement('div');
      div.className = `message ${role}`;
      const body = `<div class="label">${role === 'user' ? 'You' : 'Assistant'}</div>`;
      if (role === 'assistant') {
        div.innerHTML = body + `<span class="response-text">${escapeHtml(text)}</span>`;
      } else {
        div.innerHTML = body + escapeHtml(text);
      }
      chat.appendChild(div);
      chat.scrollTop = chat.scrollHeight;
      return div;
    }

    function buildThinkingBlock() {
      const details = document.createElement('details');
      details.className = 'thinking';
      details.innerHTML = `<summary>Reasoning</summary><pre></pre>`;
      return details;
    }

    // --- Core send ---
    async function sendMessage() {
      const text = input.value.trim();
      if (!text) return;

      input.value = '';
      appendMessage('user', text);
      setInput(false);

      controller = new AbortController();

      // Build assistant shell immediately so thinking can be inserted above it
      const responseSpan = document.createElement('span');
      responseSpan.className = 'response-text';
      const assistantDiv = appendMessage('assistant', '');
      assistantDiv.appendChild(responseSpan);
      const thinkingDetails = buildThinkingBlock();
      assistantDiv.insertBefore(thinkingDetails, responseSpan);
      const thinkingPre = thinkingDetails.querySelector('pre');
      let thinkingBuffer = '';
      let inThink_block = false;
      let done = false;

      try {
        const res = await fetch('/chat/stream', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ message: text }),
          signal: controller.signal,
        });

        if (!res.ok) {
          thinkingDetails.remove();
          responseSpan.textContent = `Error: HTTP ${res.status}`;
          setInput(true);
          return;
        }

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = '';

        while (true) {
          const { done: done_reading, value } = await reader.read();
          if (done_reading) break;

          buffer += decoder.decode(value, { stream: true });
          const lines = buffer.split('\n');
          buffer = lines.pop() ?? '';

          for (const line of lines) {
            if (!line.startsWith('data: ')) continue;
            const token = line.slice(6);

            if (token.startsWith('[done')) {
              done = true;
              break;
            }
            if (token.startsWith('[error')) {
              done = true;
              thinkingBuffer += `\n[Error: ${token}]`;
              break;
            }

            // Detect <think> block boundaries within a single token
            if (token.includes('<think>')) inThink_block = true;
            if (token.includes('</think>')) inThink_block = false;

            if (inThink_block) {
              thinkingBuffer += token;
              thinkingPre.textContent = thinkingBuffer;
            } else {
              responseSpan.textContent += token;
            }
            chat.scrollTop = chat.scrollHeight;
          }
          if (done) break;
        }

        // Flush remaining buffer
        if (buffer.startsWith('data: ') && !done) {
          const token = buffer.slice(6);
          if (!token.startsWith('[done') && !token.startsWith('[error')) {
            if (inThink_block) {
              thinkingBuffer += token;
              thinkingPre.textContent = thinkingBuffer;
            } else {
              responseSpan.textContent += token;
            }
          }
        }

        // Remove empty thinking block if nothing was accumulated
        if (!thinkingBuffer.trim()) {
          thinkingDetails.remove();
        }

      } catch (err) {
        if (err.name !== 'AbortError') {
          thinkingDetails.remove();
          responseSpan.textContent = `Error: ${err.message}`;
        }
      } finally {
        setInput(true);
        input.focus();
        controller = null;
      }
    }

    sendBtn.addEventListener('click', sendMessage);
    input.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
      }
    });
  </script>

</body>
</html>
